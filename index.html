<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plakate">
<meta name="theme-color" content="#4f8ef7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Wahlplakat Erfassung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8eaf0;
    --muted: #6b7280;
    --dim: #9ca3af;
    --r: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Tabs */
  .tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bot);
    z-index: 200;
  }

  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    transition: color 0.15s;
    border: none;
    background: none;
    font-family: 'Inter', sans-serif;
  }

  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 20px; }

  /* Pages */
  .page {
    display: none;
    padding: 16px 16px calc(70px + var(--safe-bot));
    padding-top: calc(16px + var(--safe-top));
    max-width: 560px;
    margin: 0 auto;
  }
  .page.active { display: block; }

  /* Header */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .badge {
    background: var(--accent-dim);
    border: 1px solid rgba(79,142,247,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* GPS card */
  .gps-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .gps-dot {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 2px solid var(--border);
    background: var(--surface2);
    position: relative;
  }
  .gps-dot.active { border-color: var(--green); background: var(--green-dim); }
  .gps-dot.loading { border-color: var(--yellow); background: rgba(251,191,36,0.1); }
  .gps-dot.error { border-color: var(--red); background: rgba(248,113,113,0.1); }

  .pulse {
    position: absolute; inset: -2px;
    border-radius: 50%;
    border: 2px solid var(--green);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.9); opacity: 0; }
  }

  .gps-info { flex: 1; min-width: 0; }
  .gps-status { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .gps-coords {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    word-break: break-all;
  }
  .gps-coords .hl { color: var(--accent); }

  .btn-sm {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    padding: 6px 11px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* Form blocks */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Party grid */
  .party-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .party-btn {
    padding: 11px 4px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--dim);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    user-select: none;
  }
  .party-btn.sel { color: #fff; border-color: transparent; }
  .party-btn[data-p="AfD"].sel { background: #009ee0; }
  .party-btn[data-p="CDU"].sel { background: #333; border-color: #888; }
  .party-btn[data-p="SPD"].sel { background: #e3000f; }
  .party-btn[data-p="Grüne"].sel { background: #46962b; }
  .party-btn[data-p="FDP"].sel { background: #ffed00; color: #111; }
  .party-btn[data-p="Linke"].sel { background: #be3075; }
  .party-btn[data-p="BSW"].sel { background: #7c1b40; }
  .party-btn[data-p="Sonst."].sel { background: #555; }

  /* Size grid */
  .size-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .size-btn {
    padding: 12px 6px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--dim);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .size-btn .ico { font-size: 22px; }
  .size-btn .sub { font-size: 10px; color: var(--muted); }
  .size-btn.sel { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .size-btn.sel .sub { color: var(--accent); opacity: 0.7; }

  /* Type grid */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .type-btn {
    padding: 11px 8px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--dim);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    user-select: none;
  }
  .type-btn.sel { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  /* Note */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    height: 72px;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* Save button */
  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.2px;
    margin-bottom: 12px;
  }
  .btn-save:active { transform: scale(0.98); }
  .btn-save:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

  /* List page */
  .list-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .btn-action {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-action.green:hover { border-color: var(--green); color: var(--green); }
  .btn-action.red:hover { border-color: var(--red); color: var(--red); }

  .entry-list { display: flex; flex-direction: column; gap: 8px; }

  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .entry-info { flex: 1; min-width: 0; }
  .entry-party { font-weight: 700; font-size: 13px; }
  .entry-meta { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

  .entry-coords {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    font-size: 15px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-del:hover { color: var(--red); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* Stats page */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .bar-chart { display: flex; flex-direction: column; gap: 8px; }

  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-name { width: 52px; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 20px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; display: flex; align-items: center; padding-left: 8px; }
  .bar-count { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9); }
  .bar-zero .bar-fill { width: 8px !important; background: var(--border) !important; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(70px + var(--safe-bot) + 12px);
    left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--green); color: #052e16;
    font-weight: 700; font-size: 13px;
    padding: 10px 20px; border-radius: 30px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.warn { background: var(--yellow); color: #422006; }

  /* Install banner */
  .install-banner {
    background: var(--accent-dim);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: var(--r);
    padding: 12px 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .install-banner .ico { font-size: 20px; flex-shrink: 0; }
  .install-banner strong { display: block; font-size: 13px; color: var(--accent); margin-bottom: 2px; }
  .install-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- PAGES -->
<div class="page active" id="page-erfassen">
  <div class="page-header">
    <div class="page-title">Erfassen</div>
    <div class="badge" id="counterBadge">0 Plakate</div>
  </div>

  <div id="installBanner" class="install-banner" style="display:none">
    <span class="ico">📲</span>
    <div>
      <strong>Als App installieren</strong>
      Safari → Teilen → „Zum Home-Bildschirm"
    </div>
    <button class="install-close" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  </div>

  <!-- GPS -->
  <div class="gps-card">
    <div class="gps-dot loading" id="gpsDot">
      <span id="gpsEmoji">⏳</span>
    </div>
    <div class="gps-info">
      <div class="gps-status" id="gpsStatus">GPS wird geladen…</div>
      <div class="gps-coords" id="gpsCoords">Bitte warten…</div>
    </div>
    <button class="btn-sm" onclick="updateGPS()">↻ Neu</button>
  </div>

  <!-- Partei -->
  <div class="form-card">
    <div class="section-label">Partei</div>
    <div class="party-grid">
      <button class="party-btn" data-p="AfD" onclick="sel(this,'party')">AfD</button>
      <button class="party-btn" data-p="CDU" onclick="sel(this,'party')">CDU</button>
      <button class="party-btn" data-p="SPD" onclick="sel(this,'party')">SPD</button>
      <button class="party-btn" data-p="Grüne" onclick="sel(this,'party')">Grüne</button>
      <button class="party-btn" data-p="FDP" onclick="sel(this,'party')">FDP</button>
      <button class="party-btn" data-p="Linke" onclick="sel(this,'party')">Linke</button>
      <button class="party-btn" data-p="BSW" onclick="sel(this,'party')">BSW</button>
      <button class="party-btn" data-p="Sonst." onclick="sel(this,'party')">Sonst.</button>
    </div>
  </div>

  <!-- Größe -->
  <div class="form-card">
    <div class="section-label">Plakatgröße</div>
    <div class="size-grid">
      <button class="size-btn" data-s="Klein" onclick="sel(this,'size')">
        <span class="ico">🪧</span><span>Klein</span><span class="sub">A2 / A1</span>
      </button>
      <button class="size-btn" data-s="Mittel" onclick="sel(this,'size')">
        <span class="ico">📋</span><span>Mittel</span><span class="sub">A0</span>
      </button>
      <button class="size-btn" data-s="Groß" onclick="sel(this,'size')">
        <span class="ico">🗺️</span><span>Groß</span><span class="sub">Großformat</span>
      </button>
    </div>
  </div>

  <!-- Standorttyp -->
  <div class="form-card">
    <div class="section-label">Standorttyp</div>
    <div class="type-grid">
      <button class="type-btn" data-t="Hauptstraße" onclick="sel(this,'type')">🚗 Hauptstraße</button>
      <button class="type-btn" data-t="Nebenstraße" onclick="sel(this,'type')">🏘️ Nebenstraße</button>
      <button class="type-btn" data-t="Platz/Kreuzung" onclick="sel(this,'type')">⭕ Platz / Kreuzung</button>
      <button class="type-btn" data-t="Sonstiger" onclick="sel(this,'type')">📌 Sonstiger</button>
    </div>
  </div>

  <!-- Notiz -->
  <div class="form-card">
    <div class="section-label">Notiz (optional)</div>
    <textarea id="notiz" placeholder="z.B. Laternenpfahl, Fassade, Mast-Nr. …"></textarea>
  </div>

  <button class="btn-save" id="saveBtn" onclick="saveEntry()" disabled>
    📍 Plakat speichern
  </button>
</div>

<!-- LIST PAGE -->
<div class="page" id="page-liste">
  <div class="page-header">
    <div class="page-title">Einträge</div>
    <div class="badge" id="listBadge">0</div>
  </div>

  <div class="list-controls">
    <button class="btn-action green" onclick="exportCSV()">⬇ CSV Export</button>
    <button class="btn-action green" onclick="exportJSON()">⬇ JSON Export</button>
    <button class="btn-action red" onclick="clearAll()">🗑 Alle löschen</button>
  </div>

  <div class="entry-list" id="entryList"></div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div class="page-header">
    <div class="page-title">Statistik</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">Plakate gesamt</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statParteien">0</div>
      <div class="stat-label">Parteien erfasst</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statHeute">0</div>
      <div class="stat-label">Heute erfasst</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statSession">0</div>
      <div class="stat-label">Diese Sitzung</div>
    </div>
  </div>

  <div class="form-card">
    <div class="section-label" style="margin-bottom:16px">Verteilung nach Partei</div>
    <div class="bar-chart" id="barChart"></div>
  </div>

  <div class="form-card">
    <div class="section-label" style="margin-bottom:16px">Verteilung nach Größe</div>
    <div class="bar-chart" id="barSize"></div>
  </div>
</div>

<!-- TABS -->
<nav class="tabs">
  <button class="tab active" onclick="showPage('erfassen',this)">
    <span class="tab-icon">📍</span>Erfassen
  </button>
  <button class="tab" onclick="showPage('liste',this)">
    <span class="tab-icon">📋</span>Liste
  </button>
  <button class="tab" onclick="showPage('stats',this)">
    <span class="tab-icon">📊</span>Statistik
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  // --- State ---
  let gpsData = null;
  let party = null, size = null, type = null;
  let entries = JSON.parse(localStorage.getItem('plakate') || '[]');
  let idCounter = parseInt(localStorage.getItem('plakatCounter') || '1');
  let sessionCount = 0;

  // --- Init ---
  updateGPS();
  renderAll();

  // Show install hint on iOS
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('installBanner').style.display = 'flex';
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // --- GPS ---
  function updateGPS() {
    const dot = document.getElementById('gpsDot');
    const status = document.getElementById('gpsStatus');
    const coords = document.getElementById('gpsCoords');
    const emoji = document.getElementById('gpsEmoji');

    dot.className = 'gps-dot loading';
    dot.innerHTML = '<span id="gpsEmoji">⏳</span>';
    status.textContent = 'GPS wird geladen…';
    coords.textContent = 'Bitte warten…';

    if (!navigator.geolocation) {
      dot.className = 'gps-dot error';
      dot.innerHTML = '<span>⚠️</span>';
      status.textContent = 'GPS nicht verfügbar';
      coords.textContent = 'Browser unterstützt keine Geolokalisierung';
      return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
      gpsData = {
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        acc: Math.round(pos.coords.accuracy),
        ts: new Date().toISOString()
      };
      dot.className = 'gps-dot active';
      dot.innerHTML = '<div class="pulse"></div><span>📍</span>';
      status.textContent = `GPS aktiv · ±${gpsData.acc} m Genauigkeit`;
      coords.innerHTML = `<span class="hl">${gpsData.lat.toFixed(6)}</span>° N &nbsp;<span class="hl">${gpsData.lon.toFixed(6)}</span>° E`;
      checkSave();
    }, err => {
      dot.className = 'gps-dot error';
      dot.innerHTML = '<span>❌</span>';
      status.textContent = 'GPS-Fehler – Zugriff verweigert?';
      coords.textContent = 'Bitte Standortfreigabe in den Einstellungen aktivieren';
      gpsData = null;
      checkSave();
    }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 });
  }

  // --- Selection ---
  function sel(btn, group) {
    const selectors = { party: '.party-btn', size: '.size-btn', type: '.type-btn' };
    document.querySelectorAll(selectors[group]).forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    if (group === 'party') party = btn.dataset.p;
    if (group === 'size') size = btn.dataset.s;
    if (group === 'type') type = btn.dataset.t;
    checkSave();
  }

  function checkSave() {
    document.getElementById('saveBtn').disabled = !(gpsData && party && size && type);
  }

  // --- Save ---
  function saveEntry() {
    const id = 'PLK-' + String(idCounter).padStart(4, '0');
    const entry = {
      id,
      partei: party,
      groesse: size,
      standorttyp: type,
      notiz: document.getElementById('notiz').value.trim(),
      lat: gpsData.lat,
      lon: gpsData.lon,
      genauigkeit_m: gpsData.acc,
      zeitstempel: gpsData.ts
    };

    entries.unshift(entry);
    idCounter++;
    sessionCount++;
    localStorage.setItem('plakate', JSON.stringify(entries));
    localStorage.setItem('plakatCounter', String(idCounter));

    // Reset
    document.querySelectorAll('.party-btn,.size-btn,.type-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById('notiz').value = '';
    party = null; size = null; type = null;
    checkSave();
    updateGPS();
    renderAll();
    showToast('✓ ' + id + ' gespeichert');
  }

  // --- Render ---
  function renderAll() {
    renderList();
    renderStats();
    const n = entries.length;
    document.getElementById('counterBadge').textContent = n + (n === 1 ? ' Plakat' : ' Plakate');
    document.getElementById('listBadge').textContent = n;
  }

  function renderList() {
    const el = document.getElementById('entryList');
    if (!entries.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🗳️</div>Noch keine Plakate erfasst.<br>Geh auf „Erfassen" und starte die Aufnahme.</div>`;
      return;
    }
    el.innerHTML = entries.map(e => `
      <div class="entry">
        <div class="entry-id">${e.id}</div>
        <div class="entry-info">
          <div class="entry-party">${e.partei}</div>
          <div class="entry-meta">${e.groesse} · ${e.standorttyp}${e.notiz ? '<br>' + e.notiz : ''}</div>
        </div>
        <div class="entry-coords">${e.lat.toFixed(5)}<br>${e.lon.toFixed(5)}</div>
        <button class="btn-del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>
    `).join('');
  }

  function renderStats() {
    document.getElementById('statTotal').textContent = entries.length;
    const heute = new Date().toDateString();
    document.getElementById('statHeute').textContent = entries.filter(e => new Date(e.zeitstempel).toDateString() === heute).length;
    document.getElementById('statSession').textContent = sessionCount;

    const parties = ['AfD','CDU','SPD','Grüne','FDP','Linke','BSW','Sonst.'];
    const pCounts = {};
    parties.forEach(p => pCounts[p] = 0);
    entries.forEach(e => { if (pCounts[e.partei] !== undefined) pCounts[e.partei]++; else pCounts['Sonst.']++; });
    const partyColors = { AfD:'#009ee0', CDU:'#555', SPD:'#e3000f', 'Grüne':'#46962b', FDP:'#ccbb00', Linke:'#be3075', BSW:'#7c1b40', 'Sonst.':'#555' };
    const activeParties = parties.filter(p => pCounts[p] > 0);
    document.getElementById('statParteien').textContent = activeParties.length;
    const maxP = Math.max(...Object.values(pCounts), 1);
    document.getElementById('barChart').innerHTML = parties.map(p => `
      <div class="bar-row ${pCounts[p]===0?'bar-zero':''}">
        <div class="bar-name">${p}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.max(pCounts[p]/maxP*100,4)}%;background:${partyColors[p]}">
            ${pCounts[p]>0?`<span class="bar-count">${pCounts[p]}</span>`:''}
          </div>
        </div>
      </div>
    `).join('');

    const sizes = ['Klein','Mittel','Groß'];
    const sCounts = {}; sizes.forEach(s => sCounts[s]=0);
    entries.forEach(e => { if(sCounts[e.groesse]!==undefined) sCounts[e.groesse]++; });
    const maxS = Math.max(...Object.values(sCounts), 1);
    document.getElementById('barSize').innerHTML = sizes.map(s => `
      <div class="bar-row ${sCounts[s]===0?'bar-zero':''}">
        <div class="bar-name">${s}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.max(sCounts[s]/maxS*100,4)}%;background:var(--accent)">
            ${sCounts[s]>0?`<span class="bar-count">${sCounts[s]}</span>`:''}
          </div>
        </div>
      </div>
    `).join('');
  }

  // --- Delete / Clear ---
  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    localStorage.setItem('plakate', JSON.stringify(entries));
    renderAll();
    showToast('Eintrag gelöscht', true);
  }

  function clearAll() {
    if (!entries.length) return;
    if (!confirm(`Alle ${entries.length} Einträge wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.`)) return;
    entries = [];
    localStorage.setItem('plakate', JSON.stringify(entries));
    renderAll();
    showToast('Alle Einträge gelöscht', true);
  }

  // --- Export ---
  function exportCSV() {
    if (!entries.length) { showToast('⚠ Keine Daten', true); return; }
    const headers = ['ID','Partei','Groesse','Standorttyp','Notiz','Latitude','Longitude','Genauigkeit_m','Zeitstempel'];
    const rows = entries.map(e => [
      e.id, e.partei, e.groesse, e.standorttyp,
      '"' + (e.notiz||'').replace(/"/g,'""') + '"',
      e.lat, e.lon, e.genauigkeit_m, e.zeitstempel
    ]);
    const csv = [headers,...rows].map(r => r.join(';')).join('\n');
    download('\uFEFF'+csv, 'wahlplakate_'+today()+'.csv', 'text/csv;charset=utf-8;');
    showToast('⬇ CSV exportiert');
  }

  function exportJSON() {
    if (!entries.length) { showToast('⚠ Keine Daten', true); return; }
    download(JSON.stringify(entries, null, 2), 'wahlplakate_'+today()+'.json', 'application/json');
    showToast('⬇ JSON exportiert');
  }

  function download(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  function today() { return new Date().toISOString().slice(0,10); }

  // --- Navigation ---
  function showPage(name, tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    tab.classList.add('active');
    if (name === 'stats') renderStats();
  }

  // --- Toast ---
  function showToast(msg, warn=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (warn?' warn':'') + ' show';
    setTimeout(() => t.className = 'toast' + (warn?' warn':''), 2500);
  }
</script>
</body>
</html>
